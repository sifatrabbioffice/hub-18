name: GameHub-Ultimate-Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build GameHub Pro IPA
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Setup Project Directory
        run: |
          mkdir -p GameHub
          
          # ১. Info.plist তৈরি (ফাইল সাপোর্ট এবং ল্যান্ডস্কেপ মোডসহ)
          cat <<EOF > GameHub/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>GameHub</string>
              <key>CFBundleIdentifier</key>
              <string>com.sifat.gamehub.pro</string>
              <key>CFBundleName</key>
              <string>GameHub</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>2.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIFileSharingEnabled</key>
              <true/>
              <key>LSSupportsOpeningDocumentsInPlace</key>
              <true/>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          EOF

          # ২. Entitlements তৈরি (GTA 5 এর জন্য JIT এবং মেমরি পারমিশন)
          cat <<EOF > GameHub/GameHub.entitlements
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>get-task-allow</key>
              <true/>
              <key>com.apple.developer.kernel.extended-virtual-addressing</key>
              <true/>
              <key>com.apple.private.security.no-sandbox</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project GameHub.xcodeproj \
            -scheme GameHub \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/GameHub.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Export IPA (The Emulator Package)
        run: |
          mkdir -p build/Payload
          cp -r build/GameHub.xcarchive/Products/Applications/*.app build/Payload/
          cd build
          zip -qr GameHub_Pro_V2.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: GameHub-Pro-V2-Installation-File
          path: build/GameHub_Pro_V2.ipa
