name: GameHub-Ultimate-Fix

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Fix Binary Mapping and Build
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Setup Fix Directory
        run: |
          mkdir -p GameHub
          
          # ১. CFBundleExecutable এবং CFBundleIdentifier সুনির্দিষ্ট করা হয়েছে
          cat <<EOF > GameHub/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>GameHub</string>
              <key>CFBundleIdentifier</key>
              <string>com.sifat.gamehub.pro</string>
              <key>CFBundleName</key>
              <string>GameHub</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>2.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIFileSharingEnabled</key>
              <true/>
              <key>LSSupportsOpeningDocumentsInPlace</key>
              <true/>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build and Fix Binary
        run: |
          # এই কমান্ডটি বাইনারি ফাইলকে সঠিক পারমিশন দিয়ে আর্ক্রাইভ করবে
          xcodebuild archive \
            -project GameHub.xcodeproj \
            -scheme GameHub \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/GameHub.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Export IPA with Correct Structure
        run: |
          mkdir -p build/Payload
          cp -r build/GameHub.xcarchive/Products/Applications/GameHub.app build/Payload/
          
          # বাইনারি ফাইলের এক্সিকিউটেবল পারমিশন নিশ্চিত করা (এটিই এরর সলভ করবে)
          chmod +x build/Payload/GameHub.app/GameHub
          
          cd build
          zip -qr GameHub_Fixed.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameHub-No-Error-IPA
          path: build/GameHub_Fixed.ipa
