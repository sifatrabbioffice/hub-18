name: GameHub-Ultimate-Fix

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Fix Binary Mapping and Build
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Setup Fix Directory
        run: |
          mkdir -p GameHub
          
          # ১. CFBundleExecutable এবং CFBundleIdentifier সুনির্দিষ্ট করা হয়েছে
          cat <<EOF > GameHub/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>GameHub</string>
              <key>CFBundleIdentifier</key>
              <string>com.sifat.gamehub.pro</string>
              <key>CFBundleName</key>
              <string>GameHub</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>2.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIFileSharingEnabled</key>
              <true/>
              <key>LSSupportsOpeningDocumentsInPlace</key>
              <true/>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build and Fix Binary
        run: |
          # এই কমান্ডটি বাইনারি ফাইলকে সঠিক পারমিশন দিয়ে আর্ক্রাইভ করবে
          xcodebuild archive \
            -project GameHub.xcodeproj \
            -scheme GameHub \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/GameHub.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Export IPA with Deep Search Fix
        run: |
          mkdir -p build/Payload
          
          # ১. অ্যাপ ফাইলটি কপি করা
          cp -r build/GameHub.xcarchive/Products/Applications/*.app build/Payload/
          
          # ২. সঠিক পাথ সেট করা
          APP_PATH=$(ls -d build/Payload/*.app)
          
          # ৩. ইনফো লিস্ট থেকে আসল বাইনারি নাম খুঁজে বের করা (সবচেয়ে নিরাপদ উপায়)
          # যদি CFBundleExecutable না থাকে, তবে আমরা অ্যাপের নামই ব্যবহার করব
          BINARY_NAME=$(defaults read "$(pwd)/$APP_PATH/Info.plist" CFBundleExecutable)
          
          echo "Detected Binary Name: $BINARY_NAME"
          
          # ৪. ফাইলটি আছে কিনা চেক করা এবং পারমিশন দেওয়া
          if [ -f "$APP_PATH/$BINARY_NAME" ]; then
              chmod +x "$APP_PATH/$BINARY_NAME"
              echo "Successfully fixed permissions for $BINARY_NAME"
          else
              # যদি না পাওয়া যায়, তবে অ্যাপ ফোল্ডারের ভেতর সবচেয়ে বড় ফাইলটিই সাধারণত বাইনারি হয়
              echo "Warning: Specific binary not found, searching for the largest file..."
              TARGET=$(find "$APP_PATH" -maxdepth 1 -type f -not -name "PkgInfo" -not -name "*.plist" | xargs du -s | sort -n | tail -1 | cut -f2)
              chmod +x "$TARGET"
              echo "Permissions applied to: $(basename "$TARGET")"
          fi
          
          # ৫. ফাইনাল জিপিং
          cd build
          zip -qr GameHub_Final.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameHub-Pro-Final
          path: build/GameHub_Final.ipa
