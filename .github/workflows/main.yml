name: GameHub Ultimate Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Tools
        run: brew install xcodegen
      
      - name: Build Project
        run: |
          mkdir -p GameHub
          # Entitlements fix for JIT & File Access
          cat <<EOF > GameHub/GameHub.entitlements
          <dict>
              <key>com.apple.developer.kernel.extended-virtual-addressing</key>
              <true/>
              <key>com.apple.private.security.no-sandbox</key>
              <true/>
              <key>get-task-allow</key>
              <true/>
          </dict>
          EOF
          
          xcodegen generate
          
          xcodebuild archive \
            -project GameHub.xcodeproj \
            -scheme GameHub \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/GameHub.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir -p build/Payload
          cp -r build/GameHub.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -qr GameHub_Pro_V2.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GameHub-Pro-V2
          path: build/GameHub_Pro_V2.ipa
